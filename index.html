<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Energie">
<meta name="theme-color" content="#0a0f1e">
<title>Energie Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0a0f1e; --bg3:#1a2236; --card:#161d2e;
  --border:rgba(255,255,255,0.07);
  --strom:#f59e0b; --gas:#ef4444; --wasser:#3b82f6; --temp:#10b981;
  --text:#f1f5f9; --muted:#64748b; --green:#10b981; --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:100px;overscroll-behavior:none;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-family:'Space Mono',monospace;font-size:15px;letter-spacing:0.08em;}
.topbar p{font-size:11px;color:var(--muted);margin-top:1px;}
.badge{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:var(--strom);font-family:'Space Mono',monospace;font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;}

/* LOADING */
#loadingBar{height:2px;background:linear-gradient(90deg,var(--strom),var(--gas),var(--wasser));background-size:200%;animation:slide 1.2s linear infinite;display:none;}
#loadingBar.active{display:block;}
@keyframes slide{0%{background-position:0%}100%{background-position:200%}}
.error-banner{margin:12px 14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:rgba(239,100,100,0.9);display:none;}

/* ZÄHLER */
.zaehler-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px 14px 0;}
.zcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center;position:relative;overflow:hidden;}
.zcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.zcard.s::before{background:var(--strom);}
.zcard.g::before{background:var(--gas);}
.zcard.w::before{background:var(--wasser);}
.zlabel{font-size:9px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;font-weight:500;}
.zval{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;margin:4px 0 2px;}
.zcard.s .zval{color:var(--strom);}
.zcard.g .zval{color:var(--gas);}
.zcard.w .zval{color:var(--wasser);}
.zunit{font-size:9px;color:var(--muted);}

/* SECTION */
.section{padding:16px 14px 0;}
.section-title{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px;}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.tab.active{color:#0a0f1e;border-color:transparent;}
.tab.strom.active{background:var(--strom);}
.tab.gas.active{background:var(--gas);}
.tab.wasser.active{background:var(--wasser);}
.tab.temp.active{background:var(--temp);}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.sum-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.sum-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.sum-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.sum-trend{font-size:11px;margin-top:3px;}
.trend-up{color:var(--gas);}
.trend-down{color:var(--green);}

/* CHART */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.legend-item.hi{color:var(--text);font-weight:600;}
.chart-wrap{position:relative;height:220px;}

/* TABLE */
.mtable{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:10px;}
.mtable table{width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:11px;}
.mtable th{background:var(--bg3);padding:7px 6px;text-align:right;color:var(--muted);font-size:10px;font-weight:400;white-space:nowrap;}
.mtable th:first-child{text-align:left;width:30px;}
.mtable td{padding:7px 6px;text-align:right;border-top:1px solid var(--border);white-space:nowrap;}
.mtable td:first-child{text-align:left;color:var(--muted);}
.mtable tr.cm td{background:rgba(255,255,255,0.03);}
.mtable td.hi{font-weight:700;color:var(--text);}
.mtable td.best{color:var(--green);}
.mtable td.worst{color:var(--gas);}

/* INSTALL HINT */
.install-hint{margin:12px 14px 0;background:rgba(59,130,246,0.08);border:1px dashed rgba(59,130,246,0.3);border-radius:10px;padding:10px 14px;font-size:11px;color:rgba(100,160,255,0.8);line-height:1.5;display:flex;gap:8px;align-items:flex-start;}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--bg3) 50%,var(--card) 75%);background-size:200%;animation:shimmer 1.2s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.nav-item.active{color:var(--strom);}
.nav-icon{font-size:20px;}
canvas{display:block;}
</style>
</head>
<body>

<div id="loadingBar"></div>

<div class="topbar">
  <div>
    <h1>ENERGIE</h1>
    <p id="lastUpdate">Lade Daten…</p>
  </div>
  <div class="badge" onclick="loadData(true)">↻ Refresh</div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="install-hint" id="hint">
  <span style="font-size:16px;flex-shrink:0">📲</span>
  <span>Safari → Teilen <b>⎙</b> → <b>„Zum Home-Bildschirm"</b></span>
</div>

<!-- ZÄHLER -->
<div class="zaehler-grid">
  <div class="zcard g"><div class="zlabel">Gas</div><div class="zval" id="z-gas">–</div><div class="zunit">m³ Zähler</div></div>
  <div class="zcard s"><div class="zlabel">Strom</div><div class="zval" id="z-strom">–</div><div class="zunit">kWh Zähler</div></div>
  <div class="zcard w"><div class="zlabel">Wasser</div><div class="zval" id="z-wasser">–</div><div class="zunit">m³ Zähler</div></div>
</div>

<!-- JAHRESVERGLEICH -->
<div class="section">
  <div class="section-title">Jahresvergleich</div>
  <div class="tabs">
    <button class="tab strom active" onclick="switchTab('strom',this)">⚡ Strom</button>
    <button class="tab gas" onclick="switchTab('gas',this)">🔥 Gas</button>
    <button class="tab wasser" onclick="switchTab('wasser',this)">💧 Wasser</button>
    <button class="tab temp" onclick="switchTab('temp',this)">🌡 Temp</button>
  </div>
  <div class="sum-grid" id="sumCards"></div>
  <div class="chart-card">
    <div class="legend" id="legend"></div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
  <div class="mtable" id="table"></div>
</div>

<div style="height:20px"></div>

<div class="bottom-nav">
  <div class="nav-item active"><div class="nav-icon">📊</div><div>Dashboard</div></div>
  <div class="nav-item"><div class="nav-icon">📈</div><div>Trends</div></div>
  <div class="nav-item"><div class="nav-icon">📅</div><div>Monat</div></div>
  <div class="nav-item"><div class="nav-icon">⚙️</div><div>Setup</div></div>
</div>

<script>
if(window.navigator.standalone) document.getElementById('hint').style.display='none';

const API_URL = 'https://script.google.com/macros/s/AKfycby5_WYDWxvEVaTABlIAbCEgsdllyuhzlpD3d4JrR7o2QDsIm8RFqsdGvbnTZO_GIt3NCA/exec';
const CACHE_KEY = 'energie_data';
const CACHE_TTL = 60 * 60 * 1000; // 1 Stunde

const M=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const J=[2021,2022,2023,2024,2025,2026];
const C=['rgba(100,116,139,0.85)','rgba(99,102,241,0.85)','rgba(20,184,166,0.85)','rgba(245,158,11,0.85)','rgba(59,130,246,0.85)','#f1f5f9'];

const META = {
  strom: {label:'Strom', unit:'kWh', color:'#f59e0b'},
  gas:   {label:'Gas',   unit:'m³',  color:'#ef4444'},
  wasser:{label:'Wasser',unit:'m³',  color:'#3b82f6'},
  temp:  {label:'Temp',  unit:'°C',  color:'#10b981'}
};

let DB = null;
let curTab = 'strom';
let mainChart = null;

// ── LOAD DATA ──────────────────────────────────────────────
async function loadData(forceRefresh = false) {
  const bar = document.getElementById('loadingBar');
  bar.classList.add('active');

  // Try cache first
  if (!forceRefresh) {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try {
        const {data, ts} = JSON.parse(cached);
        if (Date.now() - ts < CACHE_TTL) {
          DB = data;
          bar.classList.remove('active');
          applyData();
          return;
        }
      } catch(e) {}
    }
  }

  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    DB = data;
    localStorage.setItem(CACHE_KEY, JSON.stringify({data, ts: Date.now()}));
    document.getElementById('errorBanner').style.display = 'none';
    applyData();

  } catch(err) {
    const banner = document.getElementById('errorBanner');
    banner.textContent = '⚠️ Fehler beim Laden: ' + err.message + ' — Zeige gecachte Daten.';
    banner.style.display = 'block';

    // Fallback to cache even if stale
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try { DB = JSON.parse(cached).data; applyData(); } catch(e) {}
    }
  }

  bar.classList.remove('active');
}

function applyData() {
  if (!DB) return;

  // Last update
  document.getElementById('lastUpdate').textContent = 'Stand: ' + (DB.lastUpdate || '–');

  // Zählerstände
  const z = DB.zaehler || {};
  document.getElementById('z-strom').textContent = z.strom ? Number(z.strom).toLocaleString('de') : '36661';
  document.getElementById('z-gas').textContent   = z.gas   ? Number(z.gas).toLocaleString('de')   : '7946';
  document.getElementById('z-wasser').textContent= z.wasser? Number(z.wasser).toLocaleString('de'): '545';

  render();
}

// ── TABS ───────────────────────────────────────────────────
function switchTab(t, btn) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── RENDER ─────────────────────────────────────────────────
function render() {
  if (!DB) return;
  const key = curTab;
  const raw = DB[key];
  if (!raw) return;

  const meta = META[key];
  const vals  = raw.values || raw;
  const tots  = raw.totals || {};

  // Find last month with data in 2026
  const v26 = vals[2026] || [];
  let lastM = -1;
  v26.forEach((v, i) => { if (v !== null && v !== '') lastM = i; });
  if (lastM < 0) lastM = 0;

  // Summary cards
  const cur26 = tots[2026] || v26.filter(v=>v!==null).reduce((a,b)=>a+b,0);
  const v26m  = v26[lastM];
  const v25m  = (vals[2025]||[])[lastM];
  const pct   = (v25m && v26m !== null) ? ((v26m - v25m) / v25m * 100).toFixed(1) : null;
  const sign  = pct > 0 ? '+' : '';
  const tcls  = key==='temp' ? '' : (pct > 0 ? 'trend-up' : 'trend-down');

  // Compare 2026 total vs same months 2025
  const v25slice = (vals[2025]||[]).slice(0, lastM+1).filter(v=>v!==null);
  const sum25 = v25slice.reduce((a,b)=>a+b,0);
  const sum26 = v26.slice(0, lastM+1).filter(v=>v!==null).reduce((a,b)=>a+b,0);
  const ytdPct = sum25 ? (((sum26 - sum25) / sum25) * 100).toFixed(1) : null;
  const ytdSign = ytdPct > 0 ? '+' : '';
  const ytdCls = key==='temp' ? '' : (ytdPct > 0 ? 'trend-up' : 'trend-down');

  document.getElementById('sumCards').innerHTML = `
    <div class="sum-card">
      <div class="sum-label">2026 gesamt</div>
      <div class="sum-val" style="color:${meta.color}">${fmt(sum26)}</div>
      <div class="sum-sub">${meta.unit} · Jan–${M[lastM]}</div>
      ${ytdPct!==null ? `<div class="sum-trend ${ytdCls}">${ytdSign}${ytdPct}% vs 2025</div>` : ''}
    </div>
    <div class="sum-card">
      <div class="sum-label">${M[lastM]} 2026</div>
      <div class="sum-val" style="color:${meta.color}">${v26m !== null ? fmt(v26m) : '–'}</div>
      <div class="sum-sub">${meta.unit}</div>
      ${pct!==null ? `<div class="sum-trend ${tcls}">${sign}${pct}% vs ${M[lastM]} 2025</div>` : ''}
    </div>`;

  // Chart
  if (mainChart) { mainChart.destroy(); mainChart = null; }

  const datasets = J.map((yr, i) => ({
    label: String(yr),
    data: (vals[yr] || []).map(v => v===''||v===undefined ? null : v),
    borderColor: C[i],
    backgroundColor: yr===2026 ? 'rgba(241,245,249,0.06)' : 'transparent',
    borderWidth: yr===2026 ? 2.5 : 1.5,
    pointRadius: yr===2026 ? 3 : 1.5,
    pointBackgroundColor: C[i],
    tension: 0.4, spanGaps: false, fill: yr===2026
  }));

  document.getElementById('legend').innerHTML = J.map((yr,i) =>
    `<div class="legend-item ${yr===2026?'hi':''}">
      <div class="legend-dot" style="background:${C[i]}"></div>${yr}
    </div>`).join('');

  mainChart = new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'line',
    data: { labels: M, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,15,30,0.97)',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
          titleColor: '#94a3b8', bodyColor: '#f1f5f9', padding: 10, cornerRadius: 8,
          callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y!==null ? fmt(c.parsed.y) : '–'} ${meta.unit}` }
        }
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#475569',font:{size:9}} },
        y: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#475569',font:{size:9},callback:v=>v+' '+meta.unit} }
      }
    }
  });

  // Table
  const rows = M.map((m, i) => {
    const rowVals = J.map(yr => {
      const v = (vals[yr]||[])[i];
      return (v===null||v===''||v===undefined) ? null : Number(v);
    });
    const defined = rowVals.filter(v => v !== null);
    const minV = defined.length ? Math.min(...defined) : null;
    const maxV = defined.length ? Math.max(...defined) : null;
    const cells = J.map((yr, j) => {
      const v = rowVals[j];
      if (v === null) return `<td style="color:var(--muted)">–</td>`;
      const best  = key!=='temp' && v===minV && defined.length>1;
      const worst = key!=='temp' && v===maxV && defined.length>1;
      const cls = [yr===2026?'hi':'', best?'best':'', worst?'worst':''].filter(Boolean).join(' ');
      return `<td class="${cls}">${fmt(v)}</td>`;
    }).join('');
    return `<tr class="${i===lastM?'cm':''}"><td>${m}</td>${cells}</tr>`;
  }).join('');

  const totRow = J.map((yr, i) => {
    const t = tots[yr];
    return `<td class="${yr===2026?'hi':''}" style="color:${yr===2026?'var(--text)':C[i]}">${t!=null?fmt(t):'–'}</td>`;
  }).join('');

  document.getElementById('table').innerHTML = `<table>
    <thead><tr><th>Mon</th>${J.map((yr,i)=>`<th style="color:${C[i]}">${yr}</th>`).join('')}</tr></thead>
    <tbody>${rows}
    <tr style="border-top:2px solid rgba(255,255,255,0.12)">
      <td style="color:var(--muted);font-weight:700">Σ</td>${totRow}
    </tr></tbody></table>`;
}

function fmt(v) {
  if (v === null || v === undefined) return '–';
  return Number(v).toLocaleString('de', {maximumFractionDigits: 1});
}

// ── START ──────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
