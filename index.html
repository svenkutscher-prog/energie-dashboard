<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WAGAEL">
<meta name="theme-color" content="#0a0f1e">
<title>WAGAEL - Garten Update</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0a0f1e; --bg3:#1a2236; --card:#161d2e;
  --border:rgba(255,255,255,0.07);
  --strom:#f59e0b; --gas:#ef4444; --wasser:#3b82f6; --temp:#10b981;
  --text:#f1f5f9; --muted:#94a3b8; --green:#10b981; --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;padding-bottom:90px;overscroll-behavior:none;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-family:'Space Mono',monospace;font-size:20px;letter-spacing:0.1em;font-weight:700;}
.refresh-btn{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:var(--strom);font-family:'Space Mono',monospace;font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* SECTION */
.section{padding:16px 14px 0;}
.section-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px;}

/* CARDS & CHARTS */
.chart-card, .curve-card, .settings-group, .acc-group, .wasser-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.chart-wrap{position:relative;height:220px;}

/* SETTINGS UI */
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.acc-left{display:flex;align-items:center;gap:12px;}
.acc-icon{font-size:20px;width:28px;text-align:center;}
.acc-name{font-size:15px;font-weight:500;color:var(--text);}
.acc-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.acc-body{border-top:1px solid var(--border);display:none;padding-bottom:10px;}
.acc-body.open{display:block;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:14px;font-weight:500;}

/* SELECT STYLING */
select.garden-select {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
}

/* TOGGLE */
.toggle{position:relative;width:44px;height:26px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;border-radius:13px;background:rgba(255,255,255,0.12);transition:background 0.2s;cursor:pointer;}
.toggle input:checked + .toggle-track{background:var(--green);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.2s;pointer-events:none;}
.toggle input:checked ~ .toggle-thumb{transform:translateX(18px);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;text-transform:uppercase;color:var(--muted);cursor:pointer;}
.nav-item.active{color:var(--strom);}
.nav-icon{font-size:22px;}
</style>
</head>
<body>

<div class="topbar">
  <div><h1>WAGAEL</h1><p id="lastRefresh">Daten bereit</p></div>
  <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
</div>

<div class="page active" id="page-dashboard">
  <div class="section">
    <div class="section-title">Übersicht</div>
    <div class="chart-card">
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
  </div>
</div>

<div class="page" id="page-jahr">
  <div class="section">
    <div class="section-title">Jahresvergleich</div>
    <div class="chart-card">
      <div class="chart-wrap"><canvas id="yearChart"></canvas></div>
    </div>
  </div>
</div>

<div class="page" id="page-settings">
  <div class="section">
    <div class="section-title">Konfiguration</div>
    
    <div class="acc-group">
      <div class="acc-header" onclick="toggleAcc(this)">
        <div class="acc-left"><div class="acc-icon">🌿</div><div><div class="acc-name">Gartensaison</div><div class="acc-sub">Periode im Jahres-Chart markieren</div></div></div>
        <div class="acc-right"><span class="acc-chevron">▼</span></div>
      </div>
      <div class="acc-body">
        <div class="settings-row">
            <div class="settings-label">Saison anzeigen</div>
            <label class="toggle"><input type="checkbox" id="garden-active" onchange="updateGardenPrefs()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
        </div>
        <div class="settings-row">
            <div class="settings-label">Start Monat</div>
            <select id="garden-start" class="garden-select" onchange="updateGardenPrefs()"></select>
        </div>
        <div class="settings-row">
            <div class="settings-label">Ende Monat</div>
            <select id="garden-end" class="garden-select" onchange="updateGardenPrefs()"></select>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('dashboard',this)"><div class="nav-icon">📊</div><div>Dash</div></div>
  <div class="nav-item" onclick="showPage('jahr',this)"><div class="nav-icon">📅</div><div>Jahr</div></div>
  <div class="nav-item" onclick="showPage('settings',this)"><div class="nav-icon">⚙️</div><div>Settings</div></div>
</div>

<script>
const MON = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const PREF_KEY = 'wagael_prefs_v3';

// Initialisierung der Monate in den Dropdowns
const startSelect = document.getElementById('garden-start');
const endSelect = document.getElementById('garden-end');
MON.forEach((m, i) => {
    startSelect.add(new Option(m, i));
    endSelect.add(new Option(m, i));
});

function defaultPrefs() {
  return { 
    garden: { active: true, start: 4, end: 8 }, // Mai bis September
    currentCat: 'wasser'
  };
}

function loadPrefs() { 
    try { return JSON.parse(localStorage.getItem(PREF_KEY)) || defaultPrefs(); } 
    catch(e) { return defaultPrefs(); } 
}

function savePrefs(p) { localStorage.setItem(PREF_KEY, JSON.stringify(p)); }

let prefs = loadPrefs();
let yearChart = null;

// UI mit gespeicherten Werten füllen
document.getElementById('garden-active').checked = prefs.garden.active;
document.getElementById('garden-start').value = prefs.garden.start;
document.getElementById('garden-end').value = prefs.garden.end;

function toggleAcc(el) {
    el.nextElementSibling.classList.toggle('open');
    el.querySelector('.acc-chevron').innerText = el.nextElementSibling.classList.contains('open') ? '▲' : '▼';
}

function showPage(name, navEl) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    navEl.classList.add('active');
    if(name === 'jahr') renderYearChart();
}

function updateGardenPrefs() {
    prefs.garden.active = document.getElementById('garden-active').checked;
    prefs.garden.start = parseInt(document.getElementById('garden-start').value);
    prefs.garden.end = parseInt(document.getElementById('garden-end').value);
    savePrefs(prefs);
    if(document.getElementById('page-jahr').classList.contains('active')) renderYearChart();
}

function renderYearChart() {
    const ctx = document.getElementById('yearChart').getContext('2d');
    if (yearChart) yearChart.destroy();

    // Beispiel-Daten (In deinem echten Code kommen diese aus deiner DB Variable)
    const dummyData = [4, 5, 3, 4, 11, 18, 10, 11, 7, 5, 5, 3]; 
    
    const datasets = [{
        label: 'Wasser m³',
        data: dummyData,
        borderColor: '#3b82f6',
        backgroundColor: '#3b82f6',
        tension: 0.4,
        zIndex: 10
    }];

    // GARTENSAISON HINTERGRUND
    if (prefs.garden.active) {
        const gardenBgData = MON.map((_, i) => {
            return (i >= prefs.garden.start && i <= prefs.garden.end) ? Math.max(...dummyData) + 2 : 0;
        });

        datasets.push({
            label: 'Gartensaison',
            data: gardenBgData,
            backgroundColor: 'rgba(16, 185, 129, 0.15)', // Dein grüner Bereich
            fill: true,
            pointRadius: 0,
            borderWidth: 0,
            stepped: 'middle',
            zIndex: 1
        });
    }

    yearChart = new Chart(ctx, {
        type: 'line',
        data: { labels: MON, datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                x: { grid: { display: false } }
            }
        }
    });
}

// Initialer Aufruf
renderYearChart();
</script>

</body>
</html>
